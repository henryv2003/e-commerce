<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ColorCart - E-Commerce Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // Single Page Apps for GitHub Pages
      // Redirect non-existent routes to index.html
      var path = window.location.pathname;
      if (path && path !== '/' && !path.endsWith('.html')) {
        var segments = path.split('/').filter(Boolean);
        // Remove repo name if it exists
        if (segments[0] === 'e-commerce') {
          segments.shift();
        }
        // Redirect to index with hash-based routing
        var redirect = '/e-commerce/#/' + segments.join('/');
        window.location.replace(redirect);
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
