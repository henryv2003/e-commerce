<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="ColorCart - E-Commerce Store">
  <title>ColorCart - E-Commerce Store</title>
  <link rel="stylesheet" href="/static/css/main.b1fcec4c.css">
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script>
    // Simple direct load approach
    document.addEventListener('DOMContentLoaded', function () {
      console.log('DOM loaded, attempting to load React app...');

      // Load React app
      var script = document.createElement('script');
      script.src = '/static/js/main.64c936fb.js';
      script.async = true;
      script.onload = function () {
        console.log('React app script loaded successfully');
      };
      script.onerror = function () {
        console.error('Failed to load React app script');
        document.getElementById('root').innerHTML =
          '<div style="padding: 20px; text-align: center; font-family: sans-serif;">' +
          '<h1>🛍️ ColorCart Store</h1>' +
          '<p>Something went wrong loading the store.</p>' +
          '<p><a href="/">🔄 Click here to refresh</a></p>' +
          '</div>';
      };

      document.head.appendChild(script);
    });
  </script>
</body>

</html>
