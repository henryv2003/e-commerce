<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Learn more: https://github.com/rafrex/spa-github-pages
      sessionStorage.redirect = sessionStorage.redirect || '';
      
      // Route all requests to index.html
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        /^https?:\\/\\/(.+?)?(?:#)?(.*)$/,
        function(match) {
          l.replace pathname = '/#' + (segmentCount ? ++segmentCount : '/');
          window.history.pushState(null, null, '/' + match[1]);
          return true;
        }
      );
      
      // This ensures that any route access loads the app
      if (!/^https?:\\/\\/.+/.test(l.href) && l.pathname !== '/') {
        l.replace('/');
      }
    </script>
    <link rel="stylesheet" href="/static/css/main.b1fcec4c.css">
  </head>
  <body>
    <div id="root"></div>
    <script src="/static/js/main.64c936fb.js"></script>
  </body>
</html>
